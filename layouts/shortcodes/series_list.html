{{ $series := .Page.Params.series }}
{{ if $series }}
  <div class="series-box" style="background: #f9f9f9; padding: 15px; border-left: 5px solid #2d3e50; margin-top: 20px;">
    <h4 style="margin-top: 0;">Mehr aus der Reihe "{{ index $series 0 }}"</h4>
    <ul>
      {{ range (index .Site.Taxonomies.series (index $series 0 | urlize)).Pages }}
        <li><a href="{{ .Permalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  </div>
{{ end }}
